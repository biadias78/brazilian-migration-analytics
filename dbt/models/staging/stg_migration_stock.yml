version: 2

models:
  - name: stg_migration_stock
    description: "Staging model that cleans, casts, and normalizes the raw migration stock data."
    columns:
      - name: destination
        description: "Cleaned destination country or region."
      - name: origin
        description: "Cleaned origin country or region."
      - name: data_type
        description: "Migration stock data type retained from the source."
      - name: destination_code
        description: "Normalized destination code."
      - name: origin_code
        description: "Normalized origin code."
      - name: year
        description: "Year of the migration stock record."
      - name: total
        description: "Total migrant stock count as a numeric value."
      - name: male
        description: "Male migrant stock count as a numeric value."
      - name: female
        description: "Female migrant stock count as a numeric value."
      - name: sheet_name
        description: "Worksheet name in the source Excel file."
